<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cotação – Brasão Gaúcho</title>
  <style>
    :root {
      --bg:#0D0D0D; --card:#1E1E1E; --card2:#252525; --border:#2E2E2E;
      --gold:#D4AF37; --orange:#E07820; --white:#F0F0F0; --gray:#888;
      --success:#43A047; --danger:#E53935;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--white);min-height:100vh}
    .header{background:#111;border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    .h-logo{font-size:26px}
    .h-title{font-size:15px;font-weight:800;letter-spacing:1px;color:var(--gold)}
    .h-sub{font-size:11px;color:var(--gray);margin-top:1px}
    .state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;gap:14px;padding:32px}
    .si{font-size:52px}
    .st{font-size:20px;font-weight:700}
    .sm{color:var(--gray);font-size:14px;line-height:1.6}
    /* Popup de confirmação */
    .popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
    .popup-box{background:var(--card);border:1px solid var(--gold);border-radius:14px;padding:28px 24px;max-width:360px;width:100%;text-align:center}
    .popup-icon{font-size:42px;margin-bottom:12px}
    .popup-title{font-size:17px;font-weight:800;color:var(--gold);margin-bottom:8px}
    .popup-msg{font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:22px}
    .popup-close{display:block;width:100%;background:var(--gold);color:#000;font-weight:800;font-size:15px;padding:14px;border:none;border-radius:10px;cursor:pointer}

    /* ══════════════════════════════
       DESKTOP LAYOUT
    ══════════════════════════════ */
    .desktop-wrap{max-width:680px;margin:0 auto;padding:20px 16px 60px}
    .info-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:18px}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px}
    .info-row+.info-row{border-top:1px solid var(--border)}
    .il{color:var(--gray)}
    .iv{font-weight:600}
    .filled-notice{background:#43A04718;border:1px solid #43A04740;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--success);margin-bottom:14px}
    .sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin:18px 0 10px}
    .cat-bar{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--orange);padding:8px 0 5px;border-bottom:1px solid var(--border);margin-bottom:6px}
    .prod-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:7px}
    .pn{font-weight:700;font-size:16px}
    .pm{font-size:13px;color:var(--gray);margin-top:2px}
    .pq{font-size:12px;color:var(--gray);margin-top:3px}
    .pg{display:flex;align-items:center;gap:5px}
    .pl{font-size:12px;color:var(--gray);white-space:nowrap}
    .pi{background:#111;border:1px solid var(--border);border-radius:6px;color:var(--white);padding:8px 8px;font-size:14px;width:98px;text-align:right;outline:none;transition:border-color .15s}
    .pi:focus{border-color:var(--gold)}
    .pi.ok{border-color:var(--success)}
    .pi-sm{background:#111;border:1px solid var(--border);border-radius:6px;color:var(--white);padding:7px 8px;font-size:14px;width:85px;text-align:right;outline:none}
    .pi-sm:focus{border-color:var(--gold)}
    .bulk-row{display:flex;align-items:center;gap:5px;margin-top:8px;flex-wrap:wrap}
    .bulk-label{font-size:11px;color:var(--gray);white-space:nowrap}
    .notes-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:18px}
    .notes-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:10px}
    .notes-ta{width:100%;background:#111;border:1px solid var(--border);border-radius:6px;color:var(--white);padding:10px 12px;font-size:14px;font-family:inherit;resize:vertical;min-height:90px;outline:none;line-height:1.5}
    .notes-ta:focus{border-color:var(--gold)}
    .btn-sub{display:block;width:100%;background:var(--gold);color:#000;font-weight:800;font-size:16px;padding:16px;border:none;border-radius:10px;cursor:pointer;margin-top:24px;letter-spacing:.5px;transition:opacity .15s}
    .btn-sub:hover{opacity:.9}
    .btn-sub:disabled{opacity:.45;cursor:not-allowed}
    .hint{font-size:12px;color:var(--gray);text-align:center;margin-top:10px;line-height:1.5}

    /* ══════════════════════════════
       MOBILE LAYOUT
    ══════════════════════════════ */
    .mobile-wrap{display:none;padding:12px 12px 80px}

    /* Info card mobile */
    .m-info{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
    .m-info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
    .m-info-row+.m-info-row{border-top:1px solid var(--border)}
    .m-il{color:var(--gray);font-size:12px}
    .m-iv{font-weight:700;font-size:13px;text-align:right}

    /* Progress bar */
    .m-progress-wrap{margin-bottom:14px}
    .m-progress-label{font-size:11px;color:var(--gray);margin-bottom:6px;display:flex;justify-content:space-between}
    .m-progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
    .m-progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}

    /* Product card mobile */
    .m-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 16px;margin-bottom:10px}
    .m-cat-tag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--orange);background:#E0782012;border:1px solid #E0782030;border-radius:4px;padding:3px 8px;margin-bottom:10px}
    .m-prod-name{font-size:21px;font-weight:800;line-height:1.3;margin-bottom:4px}
    .m-prod-brand{font-size:14px;color:var(--gray);margin-bottom:4px}
    .m-prod-qty{font-size:14px;font-weight:700;color:var(--orange);margin-bottom:16px}

    /* Price input mobile — grande e fácil de tocar */
    .m-price-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:8px}
    .m-price-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .m-currency{font-size:22px;font-weight:800;color:var(--gray)}
    .m-pi{flex:1;background:#111;border:2px solid var(--border);border-radius:10px;color:var(--white);padding:13px 12px;font-size:24px;font-weight:700;text-align:right;outline:none;transition:border-color .2s;width:100%;-webkit-appearance:none}
    .m-pi:focus{border-color:var(--gold)}
    .m-pi.ok{border-color:var(--success)}
    .m-pi-hint{font-size:11px;color:var(--gray);text-align:right;margin-bottom:14px}

    /* Bulk mobile */
    .m-bulk-sep{border-top:1px solid var(--border);padding-top:14px;margin-top:4px}
    .m-bulk-label-top{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray);margin-bottom:10px}
    .m-bulk-row{display:flex;align-items:center;gap:6px}
    .m-bulk-text{font-size:12px;color:var(--gray);white-space:nowrap}
    .m-pi-bulk-qty{background:#111;border:1px solid var(--border);border-radius:8px;color:var(--white);padding:10px 8px;font-size:14px;font-weight:700;text-align:right;outline:none;width:72px;-webkit-appearance:none}
    .m-pi-bulk-qty:focus{border-color:var(--gold)}
    .m-pi-bulk-price{background:#111;border:1px solid var(--border);border-radius:8px;color:var(--white);padding:10px 8px;font-size:14px;font-weight:700;text-align:right;outline:none;flex:1;-webkit-appearance:none}
    .m-pi-bulk-price:focus{border-color:var(--gold)}
    .m-pi-bulk-price.ok{border-color:var(--success)}

    /* Notes mobile */
    .m-notes{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:10px}
    .m-notes-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:10px}
    .m-notes-ta{width:100%;background:#111;border:1px solid var(--border);border-radius:8px;color:var(--white);padding:14px;font-size:15px;font-family:inherit;resize:vertical;min-height:100px;outline:none;line-height:1.5}
    .m-notes-ta:focus{border-color:var(--gold)}

    /* Submit mobile */
    .m-btn-sub{display:block;width:100%;background:var(--gold);color:#000;font-weight:800;font-size:18px;padding:18px;border:none;border-radius:12px;cursor:pointer;margin-top:16px;letter-spacing:.5px}
    .m-btn-sub:disabled{opacity:.45;cursor:not-allowed}
    .m-hint{font-size:12px;color:var(--gray);text-align:center;margin-top:10px;line-height:1.5}
    .m-filled-notice{background:#43A04718;border:1px solid #43A04740;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--success);margin-bottom:12px}
    /* Botões de status (Ruptura / Inativo) */
    .btn-status-group{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
    .btn-ruptura{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid #E5393540;color:#E53935;font-size:11px;font-weight:700;padding:6px 10px;border-radius:8px;cursor:pointer;transition:background .15s,border-color .15s;letter-spacing:.3px}
    .btn-ruptura:hover{background:#E5393514;border-color:#E53935}
    .btn-ruptura.active{background:#E5393520;border-color:#E53935;color:#ff6b6b}
    .btn-inativo{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid #60708040;color:#607080;font-size:11px;font-weight:700;padding:6px 10px;border-radius:8px;cursor:pointer;transition:background .15s,border-color .15s;letter-spacing:.3px}
    .btn-inativo:hover{background:#60708014;border-color:#607080}
    .btn-inativo.active{background:#60708025;border-color:#8090A0;color:#90A4AE}
    .m-status-group{display:flex;gap:8px;margin-top:14px}
    .m-btn-ruptura{display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;border:1px solid #E5393540;color:#E53935;font-size:13px;font-weight:700;padding:12px;border-radius:10px;cursor:pointer;flex:1;transition:background .15s,border-color .15s}
    .m-btn-ruptura:hover{background:#E5393514;border-color:#E53935}
    .m-btn-ruptura.active{background:#E5393520;border-color:#E53935;color:#ff6b6b}
    .m-btn-inativo{display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;border:1px solid #60708040;color:#607080;font-size:13px;font-weight:700;padding:12px;border-radius:10px;cursor:pointer;flex:1;transition:background .15s,border-color .15s}
    .m-btn-inativo:hover{background:#60708014;border-color:#607080}
    .m-btn-inativo.active{background:#60708025;border-color:#8090A0;color:#90A4AE}
    /* Badges de estado do item */
    .m-sent-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--success);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
    .m-edited-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--orange);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
    .m-ruptura-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#E53935;margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
    .m-inativo-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#8090A0;margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
  </style>
</head>
<body>
<div class="header">
  <div class="h-logo">🔥</div>
  <div>
    <div class="h-title">BRASÃO GAÚCHO</div>
    <div class="h-sub">Solicitação de Cotação</div>
  </div>
</div>
<div id="root"></div>
<div id="popup" style="display:none" class="popup-overlay">
  <div class="popup-box">
    <div class="popup-icon">👀</div>
    <div class="popup-title">Confira os preços!</div>
    <div class="popup-msg">
      Revise os valores digitados antes de enviar.<br>
      Lembre-se: <strong style="color:var(--white)">R$ 3,33</strong> deve ser digitado como <strong style="color:var(--white)">3,33</strong> — não como <strong style="color:var(--danger)">333</strong>.
    </div>
    <button class="popup-close" onclick="closePopupAndSend()">Conferi, enviar agora</button>
  </div>
</div>
<script>
  const token = location.pathname.replace(/\/+$/, '').split('/').pop();
  let _data = null;

  // Detecta mobile: tela pequena OU dispositivo touch
  const IS_MOBILE = window.innerWidth < 700 || /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmt(d){ return new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

  function autoDecimal(el) {
    const digits = el.value.replace(/\D/g, '');
    if (!digits) { el.value = ''; el.classList.remove('ok'); return; }
    const padded  = digits.padStart(3, '0');
    const intPart = padded.slice(0, -2).replace(/^0+/, '') || '0';
    const decPart = padded.slice(-2);
    el.value = intPart + ',' + decPart;
    el.classList.toggle('ok', intPart !== '0' || decPart !== '00');
  }

  function formatFromCents(digits) {
    const padded  = digits.padStart(3, '0');
    const intPart = padded.slice(0, -2).replace(/^0+/, '') || '0';
    const decPart = padded.slice(-2);
    return intPart + ',' + decPart;
  }

  function readPrice(id) {
    const v = document.getElementById(id)?.value || '';
    return parseFloat(v.replace(',', '.')) || 0;
  }

  const _rupturaSet = new Set();
  const _inativoSet = new Set();

  function toggleStatus(productId, status) {
    const btnR = document.getElementById('rup-' + productId);
    const btnI = document.getElementById('ina-' + productId);
    const inputs = ['p-', 'bq-', 'bp-'].map(p => document.getElementById(p + productId));

    const clickedWasActive = status === 'ruptura' ? _rupturaSet.has(productId) : _inativoSet.has(productId);

    // Desativa ambos
    _rupturaSet.delete(productId);
    _inativoSet.delete(productId);
    if (btnR) { btnR.classList.remove('active'); btnR.innerHTML = '⚠ Ruptura'; }
    if (btnI) { btnI.classList.remove('active'); btnI.innerHTML = '✗ Inativo'; }

    if (!clickedWasActive) {
      // Ativa o clicado
      if (status === 'ruptura') {
        _rupturaSet.add(productId);
        if (btnR) { btnR.classList.add('active'); btnR.innerHTML = '✓ Ruptura'; }
      } else {
        _inativoSet.add(productId);
        if (btnI) { btnI.classList.add('active'); btnI.innerHTML = '✓ Inativo'; }
      }
      // Limpa e desabilita inputs
      inputs.forEach(el => { if(el) { el.disabled = true; el.value = ''; el.classList.remove('ok'); } });
    } else {
      // Reabilita inputs
      inputs.forEach(el => { if(el) el.disabled = false; });
    }
  }

  function initStatusFromData(items) {
    items.forEach(i => {
      if (i.ruptura) {
        _rupturaSet.add(i.product_id);
        const btn = document.getElementById('rup-' + i.product_id);
        if (btn) { btn.classList.add('active'); btn.innerHTML = '✓ Ruptura'; }
        ['p-','bq-','bp-'].forEach(p => { const el = document.getElementById(p + i.product_id); if(el) el.disabled = true; });
      } else if (i.inativo) {
        _inativoSet.add(i.product_id);
        const btn = document.getElementById('ina-' + i.product_id);
        if (btn) { btn.classList.add('active'); btn.innerHTML = '✓ Inativo'; }
        ['p-','bq-','bp-'].forEach(p => { const el = document.getElementById(p + i.product_id); if(el) el.disabled = true; });
      }
      // Marca inputs pré-preenchidos como ok
      const inp = document.getElementById('p-' + i.product_id);
      if (inp && inp.value) inp.classList.add('ok');
      const bp = document.getElementById('bp-' + i.product_id);
      if (bp && bp.value) bp.classList.add('ok');
    });
  }

  function setupPriceInputs(unitClass, bulkClass) {
    document.querySelectorAll(unitClass).forEach(el => {
      el.addEventListener('input', () => autoDecimal(el));
    });
    document.querySelectorAll(bulkClass).forEach(el => {
      el.addEventListener('input', () => autoDecimal(el));
    });
  }

  async function load(){
    try{
      const res = await fetch('/api/price-requests/'+token);
      const data = await res.json();
      if(!res.ok){ res.status===410 ? renderExpired(data.error) : renderError(data.error); return; }
      _data = data;
      IS_MOBILE ? renderMobile(data) : renderDesktop(data);
    }catch(e){ renderError('Erro de conexão. Verifique sua internet e tente novamente.'); }
  }

  /* ══════════════════════════════════════════
     DESKTOP
  ══════════════════════════════════════════ */
  function renderDesktop(d){
    const grouped = {};
    d.items.forEach(i => { const c=i.category_name||'Geral'; if(!grouped[c]) grouped[c]=[]; grouped[c].push(i); });

    const rows = Object.entries(grouped).map(([cat,items]) => `
      <div class="cat-bar">${esc(cat)}</div>
      ${items.map(i => {
        const prevUnit = i.unit_price > 0 ? String(Math.round(i.unit_price * 100)) : '';
        const prevBulk = i.bulk_price > 0 ? String(Math.round(i.bulk_price * 100)) : '';
        return `
        <div class="prod-row" id="row-${i.product_id}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
            <div>
              <div class="pn">${esc(i.product_name)}</div>
              ${i.brand ? `<div class="pm">🏷 ${esc(i.brand)}</div>` : ''}
              <div class="pq">Qtd solicitada: <strong>${i.quantity} ${esc(i.unit||'un')}</strong></div>
            </div>
            <div class="pg">
              <span class="pl">R$ unit.</span>
              <input type="text" inputmode="numeric" class="pi" id="p-${i.product_id}"
                placeholder="0,00" value="${prevUnit ? formatFromCents(prevUnit) : ''}">
            </div>
          </div>
          <div class="bulk-row">
            <span class="bulk-label">Preço por volume: a partir de</span>
            <input type="number" step="1" min="1" inputmode="numeric" class="pi-sm" id="bq-${i.product_id}"
              placeholder="qtd" value="${i.bulk_min_qty > 0 ? i.bulk_min_qty : ''}">
            <span class="bulk-label">${esc(i.unit||'un')} por R$</span>
            <input type="text" inputmode="numeric" class="pi-sm" data-price="1" id="bp-${i.product_id}"
              placeholder="0,00" value="${prevBulk ? formatFromCents(prevBulk) : ''}">
            <span class="bulk-label">(opcional)</span>
          </div>
          <div class="btn-status-group">
            <button class="btn-ruptura" id="rup-${i.product_id}" onclick="toggleStatus(${i.product_id},'ruptura')">⚠ Ruptura</button>
            <button class="btn-inativo" id="ina-${i.product_id}" onclick="toggleStatus(${i.product_id},'inativo')">✗ Inativo</button>
          </div>
        </div>`;
      }).join('')}
    `).join('');

    const filledNoticeText = d.last_filled_at
      ? `<div class="filled-notice">✓ Preços enviados em ${fmt(d.last_filled_at)}. Você pode editar e reenviar enquanto a cotação estiver dentro do prazo.</div>`
      : '';

    document.getElementById('root').innerHTML = `
      <div class="desktop-wrap">
        <div class="info-box">
          <div class="info-row"><span class="il">Fornecedor</span><span class="iv">${esc(d.company_name)}</span></div>
          <div class="info-row"><span class="il">Unidade</span><span class="iv">${esc(d.churrascaria_name)}</span></div>
          ${d.title ? `<div class="info-row"><span class="il">Referência</span><span class="iv">${esc(d.title)}</span></div>` : ''}
          <div class="info-row"><span class="il">Válido até</span><span class="iv">${fmt(d.expires_at)}</span></div>
        </div>
        ${filledNoticeText}
        <div class="sec-title">Produtos (${d.items.length})</div>
        ${rows}
        <div class="notes-wrap">
          <div class="notes-title">Ofertas e Observações</div>
          <textarea class="notes-ta" id="vendor-notes"
            placeholder="Ofereça produtos não listados, condições especiais, prazos de entrega ou qualquer observação relevante..."></textarea>
          <div style="font-size:11px;color:var(--gray);margin-top:6px;line-height:1.5">Este campo é opcional. Use para sugerir novos produtos ou informar condições especiais.</div>
        </div>
        <button class="btn-sub" id="btn-sub" onclick="submitForm()">Enviar Preços</button>
        <p class="hint">Preencha apenas os produtos disponíveis.<br>Campos em branco serão ignorados.</p>
      </div>`;

    setupPriceInputs('.pi', '.pi-sm[data-price]');
    initStatusFromData(d.items);
  }

  /* ══════════════════════════════════════════
     MOBILE
  ══════════════════════════════════════════ */
  function renderEditableCard(i) {
    const prevUnit = i.unit_price > 0 ? String(Math.round(i.unit_price * 100)) : '';
    const prevBulk = i.bulk_price > 0 ? String(Math.round(i.bulk_price * 100)) : '';
    let statusBadge = '';
    if (i.inativo)       statusBadge = `<div class="m-inativo-badge">✗ Fora de portfólio</div>`;
    else if (i.ruptura)  statusBadge = `<div class="m-ruptura-badge">⚠ Ruptura</div>`;
    else if (i.edited_at) statusBadge = `<div class="m-edited-badge">✏ Editado</div>`;
    else if (i.unit_price > 0) statusBadge = `<div class="m-sent-badge">✓ Enviado</div>`;
    return `
    <div class="m-card">
      ${statusBadge}
      ${i.category_name ? `<div class="m-cat-tag">${esc(i.category_name)}</div>` : ''}
      <div class="m-prod-name">${esc(i.product_name)}</div>
      ${i.brand ? `<div class="m-prod-brand">🏷 ${esc(i.brand)}</div>` : ''}
      <div class="m-prod-qty">📦 ${i.quantity} ${esc(i.unit||'un')} solicitados</div>

      <div class="m-price-label">Preço por ${esc(i.unit||'un')}</div>
      <div class="m-price-row">
        <span class="m-currency">R$</span>
        <input type="text" inputmode="numeric" class="m-pi" id="p-${i.product_id}"
          placeholder="0,00" value="${prevUnit ? formatFromCents(prevUnit) : ''}">
      </div>
      <div class="m-pi-hint">Digite somente números — a vírgula entra automática</div>

      <div class="m-bulk-sep">
        <div class="m-bulk-label-top">Preço por volume <span style="color:var(--gray);font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></div>
        <div class="m-bulk-row">
          <span class="m-bulk-text">A partir de</span>
          <input type="number" step="1" min="0" inputmode="numeric" class="m-pi-bulk-qty"
            id="bq-${i.product_id}" placeholder="0" value="${i.bulk_min_qty > 0 ? i.bulk_min_qty : ''}">
          <span class="m-bulk-text">${esc(i.unit||'un')} R$</span>
          <input type="text" inputmode="numeric" class="m-pi-bulk-price" data-price="1"
            id="bp-${i.product_id}" placeholder="0,00" value="${prevBulk ? formatFromCents(prevBulk) : ''}">
        </div>
      </div>
      <div class="m-status-group">
        <button class="m-btn-ruptura" id="rup-${i.product_id}" onclick="toggleStatus(${i.product_id},'ruptura')">⚠ Ruptura</button>
        <button class="m-btn-inativo" id="ina-${i.product_id}" onclick="toggleStatus(${i.product_id},'inativo')">✗ Inativo</button>
      </div>
    </div>`;
  }

  function renderMobile(d){
    const total = d.items.length;
    const doneCount = d.items.filter(i => i.unit_price > 0 || i.ruptura || i.inativo).length;
    const allDone = doneCount === total;

    const cards = d.items.map(renderEditableCard).join('');

    const allDoneNotice = allDone
      ? `<div class="m-filled-notice">✓ Todos os ${total} produtos enviados. Você pode editar e reenviar enquanto a cotação estiver dentro do prazo.</div>`
      : '';

    document.getElementById('root').innerHTML = `
      <div class="mobile-wrap" style="display:block">
        <div class="m-info">
          <div class="m-info-row"><span class="m-il">Fornecedor</span><span class="m-iv">${esc(d.company_name)}</span></div>
          <div class="m-info-row"><span class="m-il">Unidade</span><span class="m-iv">${esc(d.churrascaria_name)}</span></div>
          ${d.title ? `<div class="m-info-row"><span class="m-il">Referência</span><span class="m-iv">${esc(d.title)}</span></div>` : ''}
          <div class="m-info-row"><span class="m-il">Válido até</span><span class="m-iv">${fmt(d.expires_at)}</span></div>
        </div>

        <div class="m-progress-wrap">
          <div class="m-progress-label">
            <span>Preenchidos</span>
            <span><span id="m-filled-count">${doneCount}</span> de ${total}</span>
          </div>
          <div class="m-progress-bar"><div class="m-progress-fill" id="m-progress-fill" style="width:${doneCount/total*100}%"></div></div>
        </div>

        ${allDoneNotice}
        ${cards}

        <div class="m-notes">
          <div class="m-notes-title">Ofertas e Observações</div>
          <textarea class="m-notes-ta" id="vendor-notes"
            placeholder="Ofereça produtos não listados, condições especiais, prazos de entrega..."></textarea>
        </div>
        <button class="m-btn-sub" id="btn-sub" onclick="submitForm()">Enviar Preços</button>
        <p class="m-hint">Preencha apenas os produtos disponíveis.<br>Campos em branco serão ignorados.<br>Você pode enviar em partes e continuar depois.</p>
      </div>`;

    setupPriceInputs('.m-pi', '.m-pi-bulk-price[data-price]');
    setupProgressTracker(total);
    initStatusFromData(d.items);
  }

  function setupProgressTracker(total) {
    function update() {
      let filled = 0;
      _data.items.forEach(i => {
        if (_rupturaSet.has(i.product_id) || _inativoSet.has(i.product_id)) {
          filled++;
        } else {
          const el = document.getElementById('p-' + i.product_id);
          if (el && el.classList.contains('ok')) filled++;
        }
      });
      document.getElementById('m-filled-count').textContent = filled;
      document.getElementById('m-progress-fill').style.width = (filled / total * 100) + '%';
    }
    document.querySelectorAll('.m-pi').forEach(el => el.addEventListener('input', update));
    update();
  }

  /* ══════════════════════════════════════════
     SUBMIT
  ══════════════════════════════════════════ */
  function submitForm(){
    const rupturaItems = _data.items
      .filter(i => _rupturaSet.has(i.product_id))
      .map(i => ({ product_id: i.product_id, ruptura: true }));
    const inativoItems = _data.items
      .filter(i => _inativoSet.has(i.product_id))
      .map(i => ({ product_id: i.product_id, inativo: true }));
    const items = _data.items
      .filter(i => !_rupturaSet.has(i.product_id) && !_inativoSet.has(i.product_id))
      .map(i => ({
        product_id:   i.product_id,
        unit_price:   readPrice('p-'+i.product_id),
        bulk_min_qty: parseFloat(document.getElementById('bq-'+i.product_id)?.value||0),
        bulk_price:   readPrice('bp-'+i.product_id),
      }))
      .filter(i => i.unit_price > 0);

    if(!items.length && !rupturaItems.length && !inativoItems.length){
      alert('Preencha pelo menos um preço ou marque Ruptura/Inativo antes de enviar.');
      return;
    }
    window._submitItems  = items;
    window._submitRuptura = rupturaItems;
    window._submitInativo = inativoItems;
    window._submitNotes  = document.getElementById('vendor-notes')?.value?.trim() || null;

    const popupMsg = document.querySelector('.popup-msg');
    if (popupMsg) {
      popupMsg.innerHTML = `Revise os valores digitados antes de enviar.<br>
        Lembre-se: <strong style="color:var(--white)">R$ 3,33</strong> deve ser digitado como <strong style="color:var(--white)">3,33</strong> — não como <strong style="color:var(--danger)">333</strong>.`;
    }
    document.getElementById('popup').style.display = 'flex';
  }

  async function closePopupAndSend(){
    document.getElementById('popup').style.display = 'none';
    const btn = document.getElementById('btn-sub');
    if(btn){ btn.disabled = true; btn.textContent = 'Enviando...'; }
    try{
      const res = await fetch('/api/price-requests/'+token+'/submit',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          items: [...window._submitItems, ...(window._submitRuptura||[]), ...(window._submitInativo||[])],
          vendor_notes: window._submitNotes
        })
      });
      const data = await res.json();
      if(!res.ok){ alert(data.error||'Erro ao enviar.'); if(btn){ btn.disabled=false; btn.textContent='Enviar Preços'; } return; }

      // Atualiza _data localmente com os valores enviados
      window._submitItems.forEach(sent => {
        const item = _data.items.find(i => i.product_id === sent.product_id);
        if(item){ item.unit_price = sent.unit_price; item.bulk_price = sent.bulk_price; item.bulk_min_qty = sent.bulk_min_qty; item.ruptura = false; item.inativo = false; }
      });
      (window._submitRuptura||[]).forEach(sent => {
        const item = _data.items.find(i => i.product_id === sent.product_id);
        if(item){ item.ruptura = true; item.unit_price = null; item.inativo = false; }
      });
      (window._submitInativo||[]).forEach(sent => {
        const item = _data.items.find(i => i.product_id === sent.product_id);
        if(item){ item.inativo = true; item.unit_price = null; item.ruptura = false; }
      });
      _data.last_filled_at = new Date().toISOString();
      _rupturaSet.clear();
      _inativoSet.clear();

      IS_MOBILE ? renderMobile(_data) : renderDesktop(_data);
    }catch(e){ alert('Erro de conexão.'); if(btn){ btn.disabled=false; btn.textContent='Enviar Preços'; } }
  }

  function renderSuccess(n){
    document.getElementById('root').innerHTML = `
      <div class="state">
        <div class="si">✅</div>
        <div class="st">Preços Enviados!</div>
        <div class="sm">${n} produto(s) enviado(s) com sucesso.<br>O Brasão Gaúcho receberá as informações automaticamente.<br><br>Obrigado!</div>
      </div>`;
  }
  function renderExpired(msg){
    document.getElementById('root').innerHTML = `
      <div class="state">
        <div class="si">⏰</div>
        <div class="st">Link Expirado</div>
        <div class="sm">${esc(msg)||'Este link de cotação não está mais disponível.'}<br>Entre em contato com o Brasão Gaúcho para um novo link.</div>
      </div>`;
  }
  function renderError(msg){
    document.getElementById('root').innerHTML = `
      <div class="state">
        <div class="si">❌</div>
        <div class="st">Cotação não encontrada</div>
        <div class="sm">${esc(msg)||'Verifique o link e tente novamente.'}</div>
      </div>`;
  }

  load();
</script>
</body>
</html>
